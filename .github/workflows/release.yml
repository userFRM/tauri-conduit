name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  github-release:
    name: GitHub Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  npm-publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure npm registry for OIDC trusted publishing
        run: |
          echo "registry=https://registry.npmjs.org/" > "$HOME/.npmrc"
          echo "node $(node --version), npm $(npm --version)"

      - name: Sync version from git tag
        working-directory: packages/tauri-plugin-conduit
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: packages/tauri-plugin-conduit
        run: npm install

      - name: Build
        working-directory: packages/tauri-plugin-conduit
        run: npm run build

      - name: Publish to npm
        working-directory: packages/tauri-plugin-conduit
        run: npm publish --access public --provenance || echo "Version already published, skipping"
