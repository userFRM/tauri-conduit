name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, 1.85.0]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: packages/tauri-plugin-conduit
        run: npm ci
      - name: Type check
        working-directory: packages/tauri-plugin-conduit
        run: npx tsc --noEmit
      - name: Run TypeScript tests
        working-directory: packages/tauri-plugin-conduit
        run: npm test
      - name: Smoke test npm package contents
        working-directory: packages/tauri-plugin-conduit
        run: |
          npm run build
          npm pack --dry-run 2>&1 | tee /tmp/tauri-plugin-conduit-pack.txt
          grep 'dist/index.js' /tmp/tauri-plugin-conduit-pack.txt

  tauri-plugin-conduit:
    name: tauri-plugin-conduit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libayatana-appindicator3-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev
      - name: Check tauri-plugin-conduit
        run: cargo check --manifest-path crates/tauri-plugin-conduit/Cargo.toml
      - name: Test plugin
        run: cargo test --manifest-path crates/tauri-plugin-conduit/Cargo.toml
      - name: Clippy tauri-plugin-conduit
        run: cargo clippy --manifest-path crates/tauri-plugin-conduit/Cargo.toml -- -D warnings

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies
        run: cargo audit
