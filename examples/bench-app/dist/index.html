<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conduit E2E Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    #status { font-size: 14px; color: #888; margin-bottom: 16px; min-height: 20px; }
    #status.running { color: #4fc3f7; }
    #status.done { color: #66bb6a; }
    #status.error { color: #ef5350; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
    th, td { padding: 8px 12px; text-align: right; border: 1px solid #333; }
    th { background: #1a1a1a; color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    td:first-child, th:first-child { text-align: left; }
    .speedup { color: #66bb6a; font-weight: 700; }
    .speedup-high { color: #00e676; font-weight: 700; }
    .label { color: #ccc; }
    .na { color: #555; font-style: italic; }
    .section-header td { background: #1a1a2a; color: #7986cb; font-weight: 600; text-align: left; font-size: 12px; border-bottom: 2px solid #333; }
    button { margin-top: 16px; padding: 8px 20px; background: #1e88e5; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:disabled { background: #444; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1565c0; }
  </style>
</head>
<body>
  <h1>Conduit E2E Benchmark</h1>
  <div id="status">Initializing...</div>
  <table>
    <thead>
      <tr>
        <th>Payload</th>
        <th>Tauri median</th>
        <th>Conduit L1 median</th>
        <th>L1 speedup</th>
        <th>Conduit L2 median</th>
        <th>L2 speedup</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
  <button id="runBtn" disabled>Run Benchmark</button>

  <script>
    // ── Tauri API (deferred access) ───────────────────────────────
    function tauriInvoke(cmd, args) {
      if (!window.__TAURI__) throw new Error('Tauri runtime not available');
      return window.__TAURI__.core.invoke(cmd, args);
    }

    // ── Conduit bootstrap ─────────────────────────────────────────
    var _conduitInfo = null;

    async function getConduitInfo() {
      if (_conduitInfo) return _conduitInfo;
      var info = await tauriInvoke('plugin:conduit|conduit_bootstrap');
      _conduitInfo = {
        invokeKey: info.invoke_key || info.invokeKey,
        base: info.protocol_base || info.protocolBase,
      };
      return _conduitInfo;
    }

    // Level 1: JSON via conduit custom protocol
    async function conduitInvokeJSON(cmd, args) {
      var ci = await getConduitInfo();
      var body = JSON.stringify(args || {});
      var url = ci.base + '/invoke/' + encodeURIComponent(cmd);
      var resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream', 'X-Conduit-Key': ci.invokeKey },
        body: new TextEncoder().encode(body),
      });
      if (!resp.ok) throw new Error('Conduit error ' + resp.status);
      var text = new TextDecoder().decode(await resp.arrayBuffer());
      return text.length === 0 ? null : JSON.parse(text);
    }

    // Level 2: Binary via conduit custom protocol (raw bytes, no JSON)
    async function conduitInvokeBinary(cmd, payload) {
      var ci = await getConduitInfo();
      var url = ci.base + '/invoke/' + encodeURIComponent(cmd);
      var resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/octet-stream', 'X-Conduit-Key': ci.invokeKey },
        body: payload,
      });
      if (!resp.ok) {
        var errText = await resp.text();
        throw new Error('Conduit L2 error ' + resp.status + ': ' + errText);
      }
      return new Uint8Array(await resp.arrayBuffer());
    }

    // ── Binary codec (matches Rust Encode/Decode derive) ──────────
    // SmallPayload: i64 + f64 + f64 + u8 = 25 bytes
    function encodeSmall(obj) {
      var buf = new ArrayBuffer(25);
      var dv = new DataView(buf);
      // i64 as two 32-bit LE words (BigInt not needed for our test value)
      var ts = obj.timestamp;
      dv.setUint32(0, ts & 0xFFFFFFFF, true);
      dv.setInt32(4, Math.floor(ts / 0x100000000), true);
      dv.setFloat64(8, obj.price, true);
      dv.setFloat64(16, obj.volume, true);
      dv.setUint8(24, obj.side);
      return new Uint8Array(buf);
    }

    function decodeSmall(bytes) {
      var dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      var lo = dv.getUint32(0, true);
      var hi = dv.getInt32(4, true);
      return {
        timestamp: hi * 0x100000000 + lo,
        price: dv.getFloat64(8, true),
        volume: dv.getFloat64(16, true),
        side: dv.getUint8(24),
      };
    }

    // LargePayload: u64(8) + Vec<u8>(4+65536) + u32(4) = 65552 bytes
    function encodeLarge(obj) {
      var dataLen = obj.data.length;
      var totalLen = 8 + 4 + dataLen + 4;
      var buf = new ArrayBuffer(totalLen);
      var dv = new DataView(buf);
      var u8 = new Uint8Array(buf);
      // u64 header
      dv.setUint32(0, obj.header & 0xFFFFFFFF, true);
      dv.setUint32(4, Math.floor(obj.header / 0x100000000), true);
      // Vec<u8>: u32 LE length + bytes
      dv.setUint32(8, dataLen, true);
      u8.set(obj.data, 12);
      // u32 checksum
      dv.setUint32(12 + dataLen, obj.checksum, true);
      return u8;
    }

    function decodeLarge(bytes) {
      var dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      var headerLo = dv.getUint32(0, true);
      var headerHi = dv.getUint32(4, true);
      var dataLen = dv.getUint32(8, true);
      return {
        header: headerHi * 0x100000000 + headerLo,
        data: new Uint8Array(bytes.buffer, bytes.byteOffset + 12, dataLen),
        checksum: dv.getUint32(12 + dataLen, true),
      };
    }

    // MediumPayload: u64 + String + Vec<f64> + Vec<String> + bool
    function encodeMedium(obj) {
      // Calculate total size
      var nameBytes = new TextEncoder().encode(obj.name);
      var tagBytes = obj.tags.map(function(t) { return new TextEncoder().encode(t); });
      var size = 8 // u64 id
        + 4 + nameBytes.length // String: u32 len + bytes
        + 4 + obj.values.length * 8 // Vec<f64>: u32 count + count*8
        + 4 // Vec<String>: u32 count
        + tagBytes.reduce(function(acc, b) { return acc + 4 + b.length; }, 0) // each string: u32 len + bytes
        + 1; // bool
      var buf = new ArrayBuffer(size);
      var dv = new DataView(buf);
      var u8 = new Uint8Array(buf);
      var off = 0;
      // u64 id
      dv.setUint32(off, obj.id & 0xFFFFFFFF, true); off += 4;
      dv.setUint32(off, Math.floor(obj.id / 0x100000000), true); off += 4;
      // String name
      dv.setUint32(off, nameBytes.length, true); off += 4;
      u8.set(nameBytes, off); off += nameBytes.length;
      // Vec<f64> values
      dv.setUint32(off, obj.values.length, true); off += 4;
      for (var i = 0; i < obj.values.length; i++) {
        dv.setFloat64(off, obj.values[i], true); off += 8;
      }
      // Vec<String> tags
      dv.setUint32(off, obj.tags.length, true); off += 4;
      for (var i = 0; i < obj.tags.length; i++) {
        var tb = tagBytes[i];
        dv.setUint32(off, tb.length, true); off += 4;
        u8.set(tb, off); off += tb.length;
      }
      // bool active
      dv.setUint8(off, obj.active ? 1 : 0);
      return u8;
    }

    function decodeMedium(bytes) {
      var dv = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
      var off = 0;
      // u64 id
      var idLo = dv.getUint32(off, true); off += 4;
      var idHi = dv.getUint32(off, true); off += 4;
      var id = idHi * 0x100000000 + idLo;
      // String name
      var nameLen = dv.getUint32(off, true); off += 4;
      var name = new TextDecoder().decode(bytes.subarray(off, off + nameLen)); off += nameLen;
      // Vec<f64> values
      var valCount = dv.getUint32(off, true); off += 4;
      var values = [];
      for (var i = 0; i < valCount; i++) {
        values.push(dv.getFloat64(off, true)); off += 8;
      }
      // Vec<String> tags
      var tagCount = dv.getUint32(off, true); off += 4;
      var tags = [];
      for (var i = 0; i < tagCount; i++) {
        var tl = dv.getUint32(off, true); off += 4;
        tags.push(new TextDecoder().decode(bytes.subarray(off, off + tl))); off += tl;
      }
      // bool active
      var active = dv.getUint8(off) === 1;
      return { id: id, name: name, values: values, tags: tags, active: active };
    }

    // ── Payloads ──────────────────────────────────────────────────
    var SMALL = { timestamp: 1710000000000, price: 42567.89, volume: 1.23456, side: 1 };

    var MEDIUM = {
      id: 9007199254740991,
      name: 'benchmark_test_payload_with_a_reasonably_long_name_for_realism',
      values: Array.from({ length: 100 }, function(_, i) { return Math.random() * 1000; }),
      tags: ['alpha', 'bravo', 'charlie', 'delta', 'echo', 'foxtrot', 'golf', 'hotel',
             'india', 'juliet', 'kilo', 'lima', 'mike', 'november', 'oscar', 'papa'],
      active: true,
    };

    var LARGE_DATA_ARRAY = Array.from({ length: 65536 }, function(_, i) { return i & 0xff; });
    var LARGE = {
      header: 12345678,
      data: LARGE_DATA_ARRAY,
      checksum: 3141592653,
    };

    // Pre-encode binary payloads (encode cost is not part of the Rust benchmark)
    var SMALL_BIN = encodeSmall(SMALL);
    var MEDIUM_BIN = encodeMedium(MEDIUM);
    var LARGE_BIN = encodeLarge({ header: 12345678, data: new Uint8Array(LARGE_DATA_ARRAY), checksum: 3141592653 });

    // ── Benchmark engine ──────────────────────────────────────────
    var WARMUP = 50;
    var ITERATIONS = 1000;

    function percentile(sorted, p) {
      var idx = Math.ceil(p / 100 * sorted.length) - 1;
      return sorted[Math.max(0, idx)];
    }

    function stats(times) {
      var s = times.slice().sort(function(a, b) { return a - b; });
      return {
        median: percentile(s, 50),
        p95: percentile(s, 95),
        p99: percentile(s, 99),
        min: s[0],
        max: s[s.length - 1],
      };
    }

    async function bench(label, fn) {
      for (var i = 0; i < WARMUP; i++) await fn();
      var BATCH = 10;
      var times = [];
      for (var i = 0; i < ITERATIONS; i++) {
        var t0 = performance.now();
        for (var b = 0; b < BATCH; b++) await fn();
        times.push((performance.now() - t0) / BATCH);
      }
      return Object.assign({ label: label }, stats(times));
    }

    // ── UI ────────────────────────────────────────────────────────
    var statusEl = document.getElementById('status');
    var resultsEl = document.getElementById('results');
    var btn = document.getElementById('runBtn');

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || '';
    }

    function fmt(ms) {
      if (ms < 1) return (ms * 1000).toFixed(0) + ' us';
      return ms.toFixed(3) + ' ms';
    }

    function addRow(label, tauri, l1, l2) {
      var l1Speedup = tauri.median / l1.median;
      var l2Speedup = l2 ? (tauri.median / l2.median) : null;
      var tr = document.createElement('tr');
      tr.innerHTML =
        '<td class="label">' + label + '</td>' +
        '<td>' + fmt(tauri.median) + '</td>' +
        '<td>' + fmt(l1.median) + '</td>' +
        '<td class="speedup">' + l1Speedup.toFixed(1) + 'x</td>' +
        (l2 ? '<td>' + fmt(l2.median) + '</td><td class="speedup-high">' + l2Speedup.toFixed(1) + 'x</td>'
             : '<td class="na">n/a</td><td class="na">n/a</td>');
      resultsEl.appendChild(tr);
      return { label: label, tauri: tauri, l1: l1, l2: l2, l1Speedup: l1Speedup, l2Speedup: l2Speedup };
    }

    // ── Run all benchmarks ────────────────────────────────────────
    async function runAll() {
      btn.disabled = true;
      resultsEl.innerHTML = '';
      var rows = [];

      try {
        await getConduitInfo();

        // --- 25B payload ---
        setStatus('Benchmarking 25B \u2014 Tauri...', 'running');
        var tauriSmall = await bench('tauri-small', function() { return tauriInvoke('tauri_echo_small', { payload: SMALL }); });
        setStatus('Benchmarking 25B \u2014 Conduit L1 (JSON)...', 'running');
        var l1Small = await bench('l1-small', function() { return conduitInvokeJSON('conduit_echo_small', { payload: SMALL }); });
        setStatus('Benchmarking 25B \u2014 Conduit L2 (binary)...', 'running');
        var l2Small = await bench('l2-small', function() { return conduitInvokeBinary('binary_echo_small', SMALL_BIN); });
        rows.push(addRow('25B payload', tauriSmall, l1Small, l2Small));

        // --- ~1KB payload ---
        setStatus('Benchmarking ~1KB \u2014 Tauri...', 'running');
        var tauriMed = await bench('tauri-med', function() { return tauriInvoke('tauri_echo_medium', { payload: MEDIUM }); });
        setStatus('Benchmarking ~1KB \u2014 Conduit L1 (JSON)...', 'running');
        var l1Med = await bench('l1-med', function() { return conduitInvokeJSON('conduit_echo_medium', { payload: MEDIUM }); });
        setStatus('Benchmarking ~1KB \u2014 Conduit L2 (binary)...', 'running');
        var l2Med = await bench('l2-med', function() { return conduitInvokeBinary('binary_echo_medium', MEDIUM_BIN); });
        rows.push(addRow('~1KB payload', tauriMed, l1Med, l2Med));

        // --- ~64KB payload ---
        setStatus('Benchmarking ~64KB \u2014 Tauri...', 'running');
        var tauriLarge = await bench('tauri-large', function() { return tauriInvoke('tauri_echo_large', { payload: LARGE }); });
        setStatus('Benchmarking ~64KB \u2014 Conduit L1 (JSON)...', 'running');
        var l1Large = await bench('l1-large', function() { return conduitInvokeJSON('conduit_echo_large', { payload: LARGE }); });
        setStatus('Benchmarking ~64KB \u2014 Conduit L2 (binary)...', 'running');
        var l2Large = await bench('l2-large', function() { return conduitInvokeBinary('binary_echo_large', LARGE_BIN); });
        rows.push(addRow('~64KB payload', tauriLarge, l1Large, l2Large));

        setStatus('Done! ' + ITERATIONS + ' iterations, ' + WARMUP + ' warmup, 10x batch.', 'done');

        // ── Print ASCII table to stdout ───────────────────────────
        var lines = [];
        var W = [18, 18, 18, 9, 18, 9];
        function pad(s, w) { while (s.length < w) s = ' ' + s; return s; }
        function bar(c, ws) { var r = c; for (var i = 0; i < ws.length; i++) { var seg = ''; for (var j = 0; j < ws[i] + 2; j++) seg += c; r += seg + c; } return r; }

        lines.push(bar('=', W));
        lines.push('| ' + [
          pad('Payload', W[0]), pad('Tauri median', W[1]),
          pad('L1 median', W[2]), pad('L1 speed', W[3]),
          pad('L2 median', W[4]), pad('L2 speed', W[5]),
        ].join(' | ') + ' |');
        lines.push(bar('=', W));
        for (var ri = 0; ri < rows.length; ri++) {
          var r = rows[ri];
          lines.push('| ' + [
            pad(r.label, W[0]),
            pad(fmt(r.tauri.median), W[1]),
            pad(fmt(r.l1.median), W[2]),
            pad(r.l1Speedup.toFixed(1) + 'x', W[3]),
            pad(r.l2 ? fmt(r.l2.median) : 'n/a', W[4]),
            pad(r.l2Speedup ? r.l2Speedup.toFixed(1) + 'x' : 'n/a', W[5]),
          ].join(' | ') + ' |');
        }
        lines.push(bar('=', W));

        await tauriInvoke('print_results', { output: lines.join('\n') });
        setTimeout(function() { tauriInvoke('exit_app').catch(function() {}); }, 500);

      } catch (e) {
        var msg = (e && e.message) ? e.message : JSON.stringify(e);
        setStatus('Error: ' + msg, 'error');
        console.error('Benchmark error:', e);
      } finally {
        btn.disabled = false;
      }
    }

    // Auto-run once Tauri runtime is available
    function waitForTauri(cb, attempts) {
      if (window.__TAURI__) return cb();
      if (attempts <= 0) { setStatus('Error: Tauri runtime not available after 10s', 'error'); return; }
      setTimeout(function() { waitForTauri(cb, attempts - 1); }, 100);
    }
    window.addEventListener('DOMContentLoaded', function() { waitForTauri(runAll, 100); });

    btn.addEventListener('click', runAll);
  </script>
</body>
</html>
