<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conduit E2E Benchmark</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0a0a0a; color: #e0e0e0; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    #status { font-size: 14px; color: #888; margin-bottom: 16px; min-height: 20px; }
    #status.running { color: #4fc3f7; }
    #status.done { color: #66bb6a; }
    #status.error { color: #ef5350; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
    th, td { padding: 8px 12px; text-align: right; border: 1px solid #333; }
    th { background: #1a1a1a; color: #aaa; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    td:first-child, th:first-child { text-align: left; }
    tr.row-small td { background: #111; }
    tr.row-medium td { background: #131313; }
    tr.row-large td { background: #161616; }
    .speedup { color: #66bb6a; font-weight: 700; }
    .label { color: #ccc; }
    button { margin-top: 16px; padding: 8px 20px; background: #1e88e5; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    button:disabled { background: #444; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1565c0; }
  </style>
</head>
<body>
  <h1>Conduit E2E Benchmark</h1>
  <div id="status">Initializing...</div>
  <table>
    <thead>
      <tr>
        <th>Payload</th>
        <th>Tauri median</th>
        <th>Tauri P95</th>
        <th>Conduit median</th>
        <th>Conduit P95</th>
        <th>Speedup</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>
  <button id="runBtn" disabled>Run Benchmark</button>

  <script>
    // ── Tauri API (deferred access) ───────────────────────────────
    function tauriInvoke(cmd, args) {
      if (!window.__TAURI__) throw new Error('Tauri runtime not available');
      return window.__TAURI__.core.invoke(cmd, args);
    }

    // ── Conduit bootstrap ─────────────────────────────────────────
    let _conduit = null;

    async function getConduit() {
      if (_conduit) return _conduit;
      var info;
      try {
        info = await tauriInvoke('plugin:conduit|conduit_bootstrap');
        console.log('Bootstrap info:', JSON.stringify(info));
      } catch (bootstrapErr) {
        console.error('Bootstrap failed:', bootstrapErr);
        throw new Error('Bootstrap failed: ' + JSON.stringify(bootstrapErr));
      }
      const invokeKey = info.invoke_key || info.invokeKey;
      const base = info.protocol_base || info.protocolBase;
      _conduit = {
        async invoke(cmd, args) {
          const body = JSON.stringify(args || {});
          const url = base + '/invoke/' + encodeURIComponent(cmd);
          const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/octet-stream', 'X-Conduit-Key': invokeKey },
            body: new TextEncoder().encode(body),
          });
          if (!resp.ok) throw new Error('Conduit error ' + resp.status + ': ' + (await resp.text()));
          const text = new TextDecoder().decode(await resp.arrayBuffer());
          return text.length === 0 ? null : JSON.parse(text);
        }
      };
      return _conduit;
    }

    // ── Payloads ──────────────────────────────────────────────────
    var SMALL = { timestamp: 1710000000000, price: 42567.89, volume: 1.23456, side: 1 };

    var MEDIUM = {
      id: 9007199254740991,
      name: 'benchmark_test_payload_with_a_reasonably_long_name_for_realism',
      values: Array.from({ length: 100 }, function(_, i) { return Math.random() * 1000; }),
      tags: ['alpha', 'bravo', 'charlie', 'delta', 'echo', 'foxtrot', 'golf', 'hotel',
             'india', 'juliet', 'kilo', 'lima', 'mike', 'november', 'oscar', 'papa'],
      active: true,
    };

    var LARGE = {
      header: 12345678,
      data: Array.from({ length: 65536 }, function(_, i) { return i & 0xff; }),
      checksum: 3141592653,
    };

    // ── Benchmark engine ──────────────────────────────────────────
    var WARMUP = 50;
    var ITERATIONS = 1000;

    function percentile(sorted, p) {
      var idx = Math.ceil(p / 100 * sorted.length) - 1;
      return sorted[Math.max(0, idx)];
    }

    function stats(times) {
      var s = times.slice().sort(function(a, b) { return a - b; });
      return {
        median: percentile(s, 50),
        p95: percentile(s, 95),
        p99: percentile(s, 99),
        min: s[0],
        max: s[s.length - 1],
      };
    }

    async function bench(label, fn) {
      for (var i = 0; i < WARMUP; i++) await fn();
      // Batch 10 calls per measurement to overcome performance.now() 1ms clamping
      var BATCH = 10;
      var times = [];
      for (var i = 0; i < ITERATIONS; i++) {
        var t0 = performance.now();
        for (var b = 0; b < BATCH; b++) await fn();
        times.push((performance.now() - t0) / BATCH);
      }
      return Object.assign({ label: label }, stats(times));
    }

    // ── UI ────────────────────────────────────────────────────────
    var statusEl = document.getElementById('status');
    var resultsEl = document.getElementById('results');
    var btn = document.getElementById('runBtn');

    function setStatus(msg, cls) {
      statusEl.textContent = msg;
      statusEl.className = cls || '';
    }

    function fmt(ms) {
      if (ms < 1) return (ms * 1000).toFixed(0) + ' us';
      return ms.toFixed(3) + ' ms';
    }

    function addRow(label, tauri, conduit) {
      var speedup = tauri.median / conduit.median;
      var cls = label.indexOf('25B') >= 0 ? 'row-small' : label.indexOf('1KB') >= 0 ? 'row-medium' : 'row-large';
      var tr = document.createElement('tr');
      tr.className = cls;
      tr.innerHTML =
        '<td class="label">' + label + '</td>' +
        '<td>' + fmt(tauri.median) + '</td>' +
        '<td>' + fmt(tauri.p95) + '</td>' +
        '<td>' + fmt(conduit.median) + '</td>' +
        '<td>' + fmt(conduit.p95) + '</td>' +
        '<td class="speedup">' + speedup.toFixed(1) + 'x</td>';
      resultsEl.appendChild(tr);
      return { label: label, tauri: tauri, conduit: conduit, speedup: speedup };
    }

    // ── Run all benchmarks ────────────────────────────────────────
    async function runAll() {
      btn.disabled = true;
      resultsEl.innerHTML = '';
      var rows = [];

      try {
        var conduit = await getConduit();

        var tests = [
          { label: '25B payload',   tauriCmd: 'tauri_echo_small',  conduitCmd: 'conduit_echo_small',  payload: SMALL },
          { label: '~1KB payload',  tauriCmd: 'tauri_echo_medium', conduitCmd: 'conduit_echo_medium', payload: MEDIUM },
          { label: '~64KB payload', tauriCmd: 'tauri_echo_large',  conduitCmd: 'conduit_echo_large',  payload: LARGE },
        ];

        for (var ti = 0; ti < tests.length; ti++) {
          var t = tests[ti];
          setStatus('Benchmarking ' + t.label + ' \u2014 Tauri...', 'running');
          var tauriResult = await bench('Tauri ' + t.label, function() { return tauriInvoke(t.tauriCmd, { payload: t.payload }); });

          setStatus('Benchmarking ' + t.label + ' \u2014 Conduit...', 'running');
          var conduitResult = await bench('Conduit ' + t.label, function() { return conduit.invoke(t.conduitCmd, { payload: t.payload }); });

          rows.push(addRow(t.label, tauriResult, conduitResult));
        }

        setStatus('Done! ' + ITERATIONS + ' iterations, ' + WARMUP + ' warmup.', 'done');

        // ── Print ASCII table to stdout ───────────────────────────
        var lines = [];
        var W = [18, 18, 18, 9];
        function pad(s, w) { while (s.length < w) s = ' ' + s; return s; }
        function bar(c, ws) { var r = c; for (var i = 0; i < ws.length; i++) { var seg = ''; for (var j = 0; j < ws[i] + 2; j++) seg += c; r += seg + c; } return r; }

        lines.push(bar('=', W));
        lines.push('| ' + [pad('Payload', W[0]), pad('Tauri median', W[1]), pad('Conduit median', W[2]), pad('Speedup', W[3])].join(' | ') + ' |');
        lines.push(bar('=', W));
        for (var ri = 0; ri < rows.length; ri++) {
          var r = rows[ri];
          lines.push('| ' + [
            pad(r.label, W[0]),
            pad(fmt(r.tauri.median), W[1]),
            pad(fmt(r.conduit.median), W[2]),
            pad(r.speedup.toFixed(1) + 'x', W[3]),
          ].join(' | ') + ' |');
        }
        lines.push(bar('=', W));

        await tauriInvoke('print_results', { output: lines.join('\n') });

        // Auto-exit after printing
        setTimeout(function() { tauriInvoke('exit_app').catch(function() {}); }, 500);

      } catch (e) {
        var msg = (e && e.message) ? e.message : JSON.stringify(e);
        setStatus('Error: ' + msg, 'error');
        console.error('Benchmark error:', e);
      } finally {
        btn.disabled = false;
      }
    }

    // Auto-run once Tauri runtime is available
    function waitForTauri(cb, attempts) {
      if (window.__TAURI__) return cb();
      if (attempts <= 0) { setStatus('Error: Tauri runtime not available after 10s', 'error'); return; }
      setTimeout(function() { waitForTauri(cb, attempts - 1); }, 100);
    }
    window.addEventListener('DOMContentLoaded', function() { waitForTauri(runAll, 100); });

    btn.addEventListener('click', runAll);
  </script>
</body>
</html>
